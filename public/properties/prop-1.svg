<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="400" fill="url(#sky)"/>

  <!-- Clouds -->
  <ellipse cx="150" cy="60" rx="60" ry="30" fill="white" opacity="0.8"/>
  <ellipse cx="1050" cy="80" rx="70" ry="35" fill="white" opacity="0.7"/>

  <!-- Ground -->
  <rect y="300" width="1200" height="100" fill="#90EE90"/>

  <!-- Left House -->
  <rect x="100" y="180" width="220" height="150" fill="#D2691E"/>
  <polygon points="100,180 210,80 320,180" fill="#8B4513"/>
  <rect x="120" y="210" width="40" height="40" fill="#87CEEB"/>
  <rect x="180" y="210" width="40" height="40" fill="#87CEEB"/>
  <rect x="240" y="210" width="40" height="40" fill="#87CEEB"/>
  <rect x="120" y="280" width="40" height="40" fill="#87CEEB"/>
  <rect x="240" y="280" width="40" height="40" fill="#87CEEB"/>

  <!-- Middle House -->
  <rect x="450" y="160" width="280" height="170" fill="#CD5C5C"/>
  <polygon points="450,160 590,40 730,160" fill="#A0522D"/>
  <rect x="480" y="200" width="45" height="45" fill="#87CEEB"/>
  <rect x="560" y="200" width="45" height="45" fill="#87CEEB"/>
  <rect x="640" y="200" width="45" height="45" fill="#87CEEB"/>
  <rect x="480" y="290" width="45" height="45" fill="#87CEEB"/>
  <rect x="560" y="290" width="45" height="45" fill="#87CEEB"/>
  <rect x="640" y="290" width="45" height="45" fill="#87CEEB"/>
  <rect x="500" y="70" width="30" height="30" fill="#FFD700"/>

  <!-- Right House -->
  <rect x="850" y="190" width="240" height="140" fill="#DC143C"/>
  <polygon points="850,190 970,90 1090,190" fill="#8B0000"/>
  <rect x="880" y="220" width="40" height="40" fill="#87CEEB"/>
  <rect x="960" y="220" width="40" height="40" fill="#87CEEB"/>
  <rect x="880" y="280" width="40" height="40" fill="#87CEEB"/>
  <rect x="960" y="280" width="40" height="40" fill="#87CEEB"/>
  <rect x="1020" y="220" width="40" height="40" fill="#87CEEB"/>

  <!-- Doors -->
  <rect x="210" y="300" width="30" height="50" fill="#654321"/>
  <circle cx="238" cy="325" r="3" fill="#FFD700"/>

  <rect x="590" y="310" width="35" height="50" fill="#654321"/>
  <circle cx="622" cy="335" r="3" fill="#FFD700"/>

  <rect x="950" y="300" width="30" height="50" fill="#654321"/>
  <circle cx="978" cy="325" r="3" fill="#FFD700"/>

  <!-- Fence -->
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#8B4513" stroke-width="4"/>
  <rect x="50" y="280" width="8" height="25" fill="#8B4513"/>
  <rect x="150" y="280" width="8" height="25" fill="#8B4513"/>
  <rect x="750" y="280" width="8" height="25" fill="#8B4513"/>
  <rect x="1100" y="280" width="8" height="25" fill="#8B4513"/>

  <!-- Street -->
  <rect y="340" width="1200" height="60" fill="#696969"/>
  <line x1="0" y1="370" x2="1200" y2="370" stroke="#FFD700" stroke-width="3" stroke-dasharray="20,10"/>
</svg>